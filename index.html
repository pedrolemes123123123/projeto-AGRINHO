<html>
    <head>
        <title>Site do Projeto</title>

        <style>
            /* AQUI COMEÇA O CSS PARA DAR COR E TAMANHO */

            /* ESTILO PARA O BLOCO VERDE QUE SEGURA TUDO */
            .bloco1{
                background-color: #3e61fc; /* DEFINE A COR DE FUNDO COMO VERDE */
                padding: 25px; /* COLOCA UM ESPAÇO DE 20 PIXELS DENTRO */
                font-family: sans-serif; /* USA UMA FONTE SEM AQUELAS SERIFAS */
                text-align: center; /* ALINHA TODO O TEXTO NO MEIO */
                color: rgb(1, 12, 0); /* COLOCA A COR DA LETRA COMO BRANCO */
            } /* FECHA O ESTILO DO BLOCO 1 */


            /* ESTILO PARA A CAIXA QUE FICA NO CENTRO */
            .caixa-meio {
                border: 6px solid #5322c5; /* COLOCA UMA BORDA CINZA DE 2 PIXELS */
                margin: 10px; /* EMPURRA AS COISAS DE FORA 20 PIXELS */
                padding: 15px; /* EMPURRA O TEXTO DE DENTRO 15 PIXELS */
                color: black; /* MUDA A LETRA PARA PRETO PARA LER MELHOR */
            } /* FECHA O ESTILO DA CAIXA MEIO */

            /* ESTILO DO BOTÃO AMARELO */
            #btn1 {
                background: #45e6d8; /* COLOCA O FUNDO DO BOTÃO EM AMARELO */
                border: none; /* TIRA AQUELA BORDA FEIA DO BOTÃO */
                padding: 10px; /* DEFINE O TAMANHO INTERNO DO BOTÃO */
                font-weight: bold; /* DEIXA O TEXTO EM NEGRITO */
                cursor: pointer; /* MOSTRA A MÃOZINHA QUANDO PASSA O MOUSE */
            } /* FECHA O ESTILO DO BOTÃO */

            /* ESTILO DO TEXTO DO RODAPÉ */
            .texto1 {
                font-size: 25px; /* DEIXA A LETRA BEM PEQUENININHA */
                margin-top: 50px; /* EMPURRA O RODAPÉ PARA BAIXO */
                border-top: 1px solid #0663a1; /* CRIA UMA LINHA PRETA EM CIMA */
            } /* FECHA O ESTILO DO TEXTO 1 */

            /* FIM DA TAG DE ESTILO CSS */
        </style>
    </head>
    <body>
        
        <div class="bloco1">

            <div style="font-size: 40px;"> Agro, cada vez mais sustentavel</div>
            <div class="caixa-meio">
                <p>O agro anda cada vez mais com a sustentabilidade!</p>

                <div id="btn1" onclick="alert('Incrível, né?')">CLIQUE AQUI</div>
            </div>

            <div class="texto1">Criado por: Pedro Lemes</div>
        </div>

        <script>
            // MANDA UMA MENSAGEM PARA O CONSOLE DO DESENVOLVEDOR
            console.log("O site abriu."); // REGISTRA O LOG DE ABERTURA
        </script>
    </body>
</html>
